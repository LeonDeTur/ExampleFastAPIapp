services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: postgis_db
    restart: unless-stopped

    environment:
      POSTGRES_DB: gis_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5434:5432"

    volumes:
      - postgis_data:/var/lib/postgresql/data

volumes:
  postgis_data: